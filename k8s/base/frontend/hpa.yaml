apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: milyfe-frontend-hpa
  namespace: milyfe
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: milyfe-frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
