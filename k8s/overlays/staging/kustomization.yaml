apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: milyfe-staging

resources:
  - ../../base

namePrefix: staging-

patches:
  - target:
      kind: Deployment
      name: milyfe-backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"

  - target:
      kind: Deployment
      name: milyfe-frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "50m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"

  - target:
      kind: HorizontalPodAutoscaler
      name: milyfe-backend-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  - target:
      kind: HorizontalPodAutoscaler
      name: milyfe-frontend-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2

  - target:
      kind: Ingress
      name: milyfe-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: staging.milyfe.ai

configMapGenerator:
  - name: milyfe-config
    behavior: merge
    literals:
      - AUTH_ENABLED=false
      - CORS_ALLOW_ALL=true
      - LOG_LEVEL=DEBUG
      - SENTRY_ENVIRONMENT=staging

images:
  - name: backend
    newName: ghcr.io/realmilyfe/milyfe-brain/backend
    newTag: latest
  - name: frontend
    newName: ghcr.io/realmilyfe/milyfe-brain/frontend
    newTag: latest
