version: "3.8"

# AMD ROCm GPU override — use with:
# docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build -d

services:
  backend:
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    deploy:
      resources:
        reservations:
          devices:
            - driver: amdgpu
              count: all
              capabilities: [gpu]
