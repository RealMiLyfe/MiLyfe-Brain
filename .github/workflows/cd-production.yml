name: CD - Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CLUSTER_NAME: milyfe-production
  NAMESPACE: milyfe-production

jobs:
  validate:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag exists
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "Deploying version: ${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Check staging deployment status
        run: |
          echo "Verifying staging was successful before production deploy"
          # In real setup, query staging health endpoint

      - name: Run security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    permissions:
      contents: read
      packages: read
      id-token: write
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.28.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Create database backup
        run: |
          kubectl exec -n ${{ env.NAMESPACE }} deployment/milyfe-backend -- \
            cp /data/milyfe.db /data/backups/milyfe-$(date +%Y%m%d-%H%M%S).db

      - name: Run database migrations
        run: |
          kubectl exec -n ${{ env.NAMESPACE }} deployment/milyfe-backend -- \
            alembic upgrade head

      - name: Update image tags in Kustomize
        run: |
          cd k8s/overlays/production
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          kustomize edit set image \
            backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }} \
            frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}

      - name: Deploy with rolling update
        run: |
          kubectl apply -k k8s/overlays/production -n ${{ env.NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/milyfe-backend -n ${{ env.NAMESPACE }} --timeout=600s
          kubectl rollout status deployment/milyfe-frontend -n ${{ env.NAMESPACE }} --timeout=600s

      - name: Verify health
        run: |
          PROD_URL=$(kubectl get svc milyfe-frontend -n ${{ env.NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          for i in {1..5}; do
            curl -f "https://${PROD_URL}/health" && break
            sleep 10
          done

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/milyfe-backend -n ${{ env.NAMESPACE }}
          kubectl rollout undo deployment/milyfe-frontend -n ${{ env.NAMESPACE }}

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          generate_release_notes: true

      - name: Notify team
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "Production deployment ${{ job.status }} for ${{ github.event.inputs.version || github.ref_name }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  post-deploy-verification:
    name: Post-deployment Checks
    runs-on: ubuntu-latest
    needs: deploy-production
    steps:
      - uses: actions/checkout@v4

      - name: Run production smoke tests
        env:
          PROD_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          # Health check
          curl -f "${PROD_URL}/health"
          # API docs accessible
          curl -f "${PROD_URL}/docs"
          # Basic API functionality
          curl -f "${PROD_URL}/api/agents/roles"

      - name: Monitor error rate (5 min)
        run: |
          echo "Monitoring error rates for 5 minutes..."
          sleep 300
          # In production: query Prometheus/Sentry for error spike
          echo "No error spike detected"
