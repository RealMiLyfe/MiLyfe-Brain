openapi: 3.1.0
info:
  title: MiLyfe Brain API
  description: |
    AI Agent Swarm Orchestration Platform API.
    Local-first, open-source platform for autonomous task execution
    via specialized AI agent collaboration.
  version: 2.0.0
  contact:
    name: MiLyfe Brain Team
    url: https://github.com/RealMiLyfe/MiLyfe-Brain
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8200
    description: Local development
  - url: https://staging.milyfe.ai
    description: Staging environment
  - url: https://api.milyfe.ai
    description: Production

tags:
  - name: Playbooks
    description: Playbook CRUD and execution
  - name: Agents
    description: Agent lifecycle management
  - name: Chat
    description: Hybrid chat with tool execution
  - name: Documents
    description: Document upload and semantic search
  - name: Streaming
    description: Real-time event streaming
  - name: Queue
    description: Execution queue management
  - name: Scheduler
    description: Cron job scheduling
  - name: Tokens
    description: Token usage tracking
  - name: Logs
    description: Action log search and export
  - name: Notifications
    description: Notification management
  - name: Health
    description: System health checks
  - name: Settings
    description: Runtime configuration
  - name: Workspace
    description: File system operations
  - name: Brain
    description: Brain services (daemon, skills, memory)


security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Optional API key for network-exposed deployments

  schemas:
    AgentRole:
      type: string
      enum:
        - orchestrator
        - researcher
        - coder
        - executor
        - critic
        - designer
        - writer
        - debugger
        - planner

    TaskStatus:
      type: string
      enum:
        - pending
        - running
        - awaiting_approval
        - completed
        - failed
        - cancelled

    TaskComplexity:
      type: string
      enum: [light, medium, heavy]

    ActionType:
      type: string
      enum:
        - file_read
        - file_write
        - file_delete
        - shell_exec
        - browse_web
        - gui_action
        - code_exec
        - llm_call
        - memory_store
        - memory_recall


    PlaybookStep:
      type: object
      properties:
        id:
          type: string
          format: uuid
        description:
          type: string
        agent_role:
          $ref: '#/components/schemas/AgentRole'
        depends_on:
          type: array
          items:
            type: string
        complexity:
          $ref: '#/components/schemas/TaskComplexity'
        tools_needed:
          type: array
          items:
            type: string
      required: [id, description]

    PlaybookCreate:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
          maxLength: 50000
        raw_text:
          type: string
          maxLength: 100000
        steps:
          type: array
          items:
            $ref: '#/components/schemas/PlaybookStep'
          maxItems: 50
        auto_execute:
          type: boolean
          default: true
      required: [title, description]

    Playbook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/TaskStatus'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/PlaybookStep'
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true


    AgentState:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/AgentRole'
        name:
          type: string
        status:
          type: string
          enum: [idle, thinking, acting, completed, failed]
        current_task:
          type: string
          nullable: true
        thoughts:
          type: array
          items:
            type: string
        actions_taken:
          type: integer
        progress:
          type: number
          minimum: 0
          maximum: 100
        model:
          type: string
        avatar_color:
          type: string

    StreamEvent:
      type: object
      properties:
        event_type:
          type: string
          enum:
            - agent_spawned
            - thought
            - action
            - progress
            - error
            - completed
        agent_id:
          type: string
        agent_role:
          $ref: '#/components/schemas/AgentRole'
        data:
          type: object
        timestamp:
          type: string
          format: date-time

    ApprovalRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        action_type:
          $ref: '#/components/schemas/ActionType'
        description:
          type: string
        details:
          type: object
        agent_id:
          type: string
        agent_role:
          $ref: '#/components/schemas/AgentRole'
        risk_level:
          type: string
          enum: [low, medium, high, critical]


    ChatMessage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
        role:
          type: string
          enum: [user, assistant, system, tool]
        content:
          type: string
        model:
          type: string
          nullable: true
        tokens_used:
          type: integer
        tool_calls:
          type: array
          items:
            type: object
        created_at:
          type: string
          format: date-time

    ChatSendRequest:
      type: object
      properties:
        message:
          type: string
          maxLength: 50000
        session_id:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        context_files:
          type: array
          items:
            type: string
      required: [message]

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        services:
          type: object
          properties:
            ollama:
              type: string
              enum: [connected, disconnected]
            chromadb:
              type: string
              enum: [connected, disconnected]
            redis:
              type: string
              enum: [connected, disconnected]
            database:
              type: string
              enum: [connected, disconnected]
        uptime_seconds:
          type: number

    Error:
      type: object
      properties:
        detail:
          type: string
        code:
          type: string
        timestamp:
          type: string
          format: date-time


paths:
  /health:
    get:
      tags: [Health]
      summary: System health check
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/playbooks/:
    post:
      tags: [Playbooks]
      summary: Create and execute a playbook
      operationId: createPlaybook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaybookCreate'
      responses:
        '201':
          description: Playbook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playbook'
        '422':
          description: Validation error
    get:
      tags: [Playbooks]
      summary: List all playbooks
      operationId: listPlaybooks
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of playbooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Playbook'


  /api/playbooks/{id}:
    get:
      tags: [Playbooks]
      summary: Get playbook details
      operationId: getPlaybook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Playbook details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playbook'
        '404':
          description: Playbook not found
    delete:
      tags: [Playbooks]
      summary: Delete a playbook
      operationId: deletePlaybook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Playbook deleted
        '404':
          description: Playbook not found

  /api/playbooks/{id}/status:
    get:
      tags: [Playbooks]
      summary: Get real-time execution status
      operationId: getPlaybookStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Execution status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    $ref: '#/components/schemas/TaskStatus'
                  progress:
                    type: number
                  current_step:
                    type: string
                  agents_active:
                    type: integer
                  steps_completed:
                    type: integer
                  steps_total:
                    type: integer

  /api/playbooks/{id}/graph:
    get:
      tags: [Playbooks]
      summary: Get task graph for visualization
      operationId: getPlaybookGraph
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task graph
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    items:
                      type: object
                  edges:
                    type: array
                    items:
                      type: object

  /api/playbooks/{id}/rerun:
    post:
      tags: [Playbooks]
      summary: Re-execute a playbook
      operationId: rerunPlaybook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Playbook re-execution started


  /api/agents/roles:
    get:
      tags: [Agents]
      summary: List available agent roles
      operationId: listAgentRoles
      responses:
        '200':
          description: Available roles
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    role:
                      $ref: '#/components/schemas/AgentRole'
                    name:
                      type: string
                    description:
                      type: string
                    preferred_model:
                      type: string

  /api/agents/active:
    get:
      tags: [Agents]
      summary: List currently active agents
      operationId: listActiveAgents
      responses:
        '200':
          description: Active agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentState'

  /api/agents/spawn:
    post:
      tags: [Agents]
      summary: Spawn a new agent
      operationId: spawnAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  $ref: '#/components/schemas/AgentRole'
                task:
                  type: string
                model:
                  type: string
                  nullable: true
              required: [role, task]
      responses:
        '201':
          description: Agent spawned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentState'

  /api/agents/{id}:
    delete:
      tags: [Agents]
      summary: Retire an agent
      operationId: retireAgent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Agent retired

  /api/agents/{id}/message:
    post:
      tags: [Agents]
      summary: Send message to agent
      operationId: messageAgent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
              required: [message]
      responses:
        '200':
          description: Agent response


  /api/chat/send:
    post:
      tags: [Chat]
      summary: Send message with tool execution
      operationId: chatSend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatSendRequest'
      responses:
        '200':
          description: Chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessage'

  /api/chat/history/{session_id}:
    get:
      tags: [Chat]
      summary: Get chat history
      operationId: getChatHistory
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Chat history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatMessage'

  /api/chat/sessions:
    get:
      tags: [Chat]
      summary: List chat sessions
      operationId: listChatSessions
      responses:
        '200':
          description: Chat sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    title:
                      type: string
                    created_at:
                      type: string
                      format: date-time
                    message_count:
                      type: integer

  /api/chat/sessions/{id}:
    delete:
      tags: [Chat]
      summary: Delete a chat session
      operationId: deleteChatSession
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Session deleted

  /api/chat/capabilities:
    get:
      tags: [Chat]
      summary: List chat agent capabilities
      operationId: getChatCapabilities
      responses:
        '200':
          description: Available capabilities
          content:
            application/json:
              schema:
                type: object
                properties:
                  tools:
                    type: array
                    items:
                      type: string
                  slash_commands:
                    type: array
                    items:
                      type: string
                  output_styles:
                    type: array
                    items:
                      type: string


  /api/documents/upload:
    post:
      tags: [Documents]
      summary: Upload document to ChromaDB
      operationId: uploadDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                collection:
                  type: string
                  default: default
      responses:
        '201':
          description: Document uploaded
        '413':
          description: File too large

  /api/documents/search:
    post:
      tags: [Documents]
      summary: Semantic search documents
      operationId: searchDocuments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                n_results:
                  type: integer
                  default: 5
                collection:
                  type: string
                  default: default
              required: [query]
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        content:
                          type: string
                        metadata:
                          type: object
                        distance:
                          type: number

  /api/documents/:
    get:
      tags: [Documents]
      summary: List uploaded documents
      operationId: listDocuments
      responses:
        '200':
          description: Document list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    filename:
                      type: string
                    collection:
                      type: string
                    uploaded_at:
                      type: string
                      format: date-time

  /api/documents/{id}:
    delete:
      tags: [Documents]
      summary: Delete a document
      operationId: deleteDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Document deleted


  /api/stream/ws:
    get:
      tags: [Streaming]
      summary: WebSocket real-time events
      operationId: streamWebSocket
      description: |
        WebSocket endpoint for real-time event streaming.
        Events include: agent_spawned, thought, action, progress, error, completed.
      responses:
        '101':
          description: WebSocket upgrade

  /api/stream/sse:
    get:
      tags: [Streaming]
      summary: SSE event stream
      operationId: streamSSE
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/StreamEvent'

  /api/queue/status:
    get:
      tags: [Queue]
      summary: Queue state
      operationId: getQueueStatus
      responses:
        '200':
          description: Queue status
          content:
            application/json:
              schema:
                type: object
                properties:
                  running:
                    type: array
                    items:
                      $ref: '#/components/schemas/Playbook'
                  waiting:
                    type: array
                    items:
                      $ref: '#/components/schemas/Playbook'
                  completed:
                    type: array
                    items:
                      $ref: '#/components/schemas/Playbook'

  /api/scheduler/jobs:
    get:
      tags: [Scheduler]
      summary: List scheduled jobs
      operationId: listScheduledJobs
      responses:
        '200':
          description: Scheduled jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    title:
                      type: string
                    cron_expression:
                      type: string
                    enabled:
                      type: boolean
                    last_run:
                      type: string
                      format: date-time
                      nullable: true
                    next_run:
                      type: string
                      format: date-time
    post:
      tags: [Scheduler]
      summary: Create scheduled job
      operationId: createScheduledJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                playbook_id:
                  type: string
                title:
                  type: string
                cron_expression:
                  type: string
                enabled:
                  type: boolean
                  default: true
              required: [playbook_id, title, cron_expression]
      responses:
        '201':
          description: Job created


  /api/tokens/stats:
    get:
      tags: [Tokens]
      summary: Token usage statistics
      operationId: getTokenStats
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 7
      responses:
        '200':
          description: Token usage stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_prompt_tokens:
                    type: integer
                  total_completion_tokens:
                    type: integer
                  by_model:
                    type: object
                  by_role:
                    type: object
                  daily:
                    type: array
                    items:
                      type: object

  /api/logs/:
    get:
      tags: [Logs]
      summary: Search and filter action logs
      operationId: getLogs
      parameters:
        - name: agent_role
          in: query
          schema:
            $ref: '#/components/schemas/AgentRole'
        - name: action_type
          in: query
          schema:
            $ref: '#/components/schemas/ActionType'
        - name: playbook_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Action logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer

  /api/notifications/:
    get:
      tags: [Notifications]
      summary: Get notifications
      operationId: getNotifications
      parameters:
        - name: unread_only
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    title:
                      type: string
                    message:
                      type: string
                    type:
                      type: string
                    read:
                      type: boolean
                    created_at:
                      type: string
                      format: date-time

  /api/notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications read
      operationId: markAllRead
      responses:
        '200':
          description: All marked read


  /api/selftest/run:
    post:
      tags: [Health]
      summary: Run full E2E self-test
      operationId: runSelfTest
      responses:
        '200':
          description: Self-test results
          content:
            application/json:
              schema:
                type: object
                properties:
                  passed:
                    type: boolean
                  tests:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        passed:
                          type: boolean
                        duration_ms:
                          type: number
                        error:
                          type: string
                          nullable: true

  /api/workspace/tree:
    get:
      tags: [Workspace]
      summary: Workspace directory tree
      operationId: getWorkspaceTree
      responses:
        '200':
          description: Directory tree
          content:
            application/json:
              schema:
                type: object

  /api/download/workspace:
    get:
      tags: [Workspace]
      summary: Download workspace as zip
      operationId: downloadWorkspace
      responses:
        '200':
          description: Zip file
          content:
            application/zip:
              schema:
                type: string
                format: binary

  /api/settings/:
    get:
      tags: [Settings]
      summary: Load runtime settings
      operationId: getSettings
      responses:
        '200':
          description: Current settings
          content:
            application/json:
              schema:
                type: object
    post:
      tags: [Settings]
      summary: Save runtime settings
      operationId: saveSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Settings saved

  /api/brain/daemon/status:
    get:
      tags: [Brain]
      summary: Daemon status
      operationId: getDaemonStatus
      responses:
        '200':
          description: Daemon info
          content:
            application/json:
              schema:
                type: object
                properties:
                  running:
                    type: boolean
                  watching:
                    type: array
                    items:
                      type: string
                  last_action:
                    type: string
                    format: date-time
                    nullable: true

  /api/brain/skills:
    get:
      tags: [Brain]
      summary: List learned skills
      operationId: listSkills
      responses:
        '200':
          description: Skills
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    category:
                      type: string
                    success_count:
                      type: integer

  /api/brain/memory:
    get:
      tags: [Brain]
      summary: Agent memories
      operationId: getMemories
      responses:
        '200':
          description: Memories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /api/brain/digest:
    get:
      tags: [Brain]
      summary: Daily digest
      operationId: getDailyDigest
      responses:
        '200':
          description: Digest content
          content:
            application/json:
              schema:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                  summary:
                    type: string
                  highlights:
                    type: array
                    items:
                      type: string
                  metrics:
                    type: object
